  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"fcae6425-bc23-4ecc-8e8a-bea06ee6c792\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n  <meta name=\"color-scheme\" content=\"light\">\n  \n  <style>\n    @keyframes ticker-scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }\n    * { box-sizing: border-box; }\n    html { scroll-behavior: smooth; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"font-family: system-ui, -apple-system, 'Helvetica Neue', sans-serif; background: oklch(98.5% 0.004 95); color: oklch(22% 0.01 95); min-height: 100vh;\">\n\n  <!-- NAV -->\n  <nav style=\"position: sticky; top: 0; z-index: 50; display: flex; align-items: center; justify-content: space-between; padding: 18px 40px; background: oklch(98.5% 0.004 95 / 0.85); backdrop-filter: blur(10px); border-bottom: 1px solid oklch(90% 0.01 95);\">\n    <a href=\"#top\" style=\"font-weight: 700; font-size: 18px; color: oklch(22% 0.01 95); text-decoration: none; letter-spacing: -0.02em;\">Filip Le<\u002Fa>\n    <div style=\"display: flex; gap: 28px;\">\n      <sc-for list=\"{{ navLinks }}\" as=\"link\" hint-placeholder-count=\"6\">\n        <a href=\"{{ link.href }}\" style=\"color: {{ link.color }}; text-decoration: none; font-size: 14px; font-weight: {{ link.weight }};\">{{ link.label }}<\u002Fa>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <!-- HERO -->\n  <header id=\"top\" style=\"padding: 120px 40px 90px; max-width: 900px; margin: 0 auto;\">\n    <div style=\"display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px; border-radius: 100px; background: oklch(95% 0.02 95); border: 1px solid oklch(88% 0.02 95); font-family: ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace; font-size: 13px; color: {{ accentColor }}; margin-bottom: 28px;\">\n      <span style=\"width: 8px; height: 8px; border-radius: 50%; background: {{ accentColor }};\"><\u002Fspan>\n      Portfolio &amp; CV\n    <\u002Fdiv>\n    <h1 style=\"font-size: 56px; line-height: 1.05; letter-spacing: -0.03em; margin: 0 0 24px; font-weight: 700;\">Filip Le<\u002Fh1>\n    <p style=\"font-size: 20px; line-height: 1.5; color: oklch(38% 0.01 95); max-width: 640px; margin: 0;\">Blivande cybersäkerhetsspecialist — bygger just nu grunden i nätverk och digital infrastruktur, med målet att bygga en karriär inom cybersäkerhet efter examen.<\u002Fp>\n  <\u002Fheader>\n\n  <!-- OM MIG -->\n  <section id=\"om-mig\" style=\"padding: 60px 40px 100px; max-width: 900px; margin: 0 auto;\">\n    <h2 style=\"font-size: 14px; text-transform: uppercase; letter-spacing: 0.1em; color: {{ accentColor }}; font-weight: 700; margin: 0 0 16px;\">Om mig<\u002Fh2>\n    <p style=\"font-size: 18px; line-height: 1.7; color: oklch(30% 0.01 95); max-width: 720px; margin: 0 0 56px;\">Jag blev intresserad av cybersäkerhet när jag upptäckte hur mycket som händer bakom kulisserna på internet. Sedan dess har jag fastnat för att lära mig hur system fungerar, bygga egna projekt och ständigt utveckla mina tekniska kunskaper. Jag motiveras av att lösa problem och utmana mig själv, både inom teknik och i vardagen. När jag inte sitter vid datorn tränar jag och följer gärna börsen och mina investeringar.<\u002Fp>\n\n    <h3 style=\"font-size: 13px; text-transform: uppercase; letter-spacing: 0.1em; color: oklch(50% 0.01 95); font-weight: 700; margin: 0 0 24px;\">Resan<\u002Fh3>\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 24px; border-top: 1px solid oklch(90% 0.01 95); padding-top: 28px;\">\n      <sc-for list=\"{{ resan }}\" as=\"step\" hint-placeholder-count=\"4\">\n        <div>\n          <div style=\"font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px; font-weight: 700; color: {{ step.whenColor }}; margin-bottom: 8px;\">{{ step.when }}<\u002Fdiv>\n          <div style=\"font-size: 15px; line-height: 1.5; color: oklch(30% 0.01 95);\">{{ step.text }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CYBERSÄKERHET (dark terminal section) -->\n  <section id=\"cybersakerhet\" style=\"padding: 90px 40px; background: oklch(18% 0.01 95); color: oklch(92% 0.01 95);\">\n    <div style=\"max-width: 900px; margin: 0 auto;\">\n      <h2 style=\"font-size: 14px; text-transform: uppercase; letter-spacing: 0.1em; color: {{ accentColor }}; font-weight: 700; margin: 0 0 24px;\">Cybersäkerhet<\u002Fh2>\n\n      <h3 style=\"font-size: 13px; text-transform: uppercase; letter-spacing: 0.1em; color: oklch(65% 0.01 95); font-weight: 700; margin: 0 0 20px;\">Certifieringar<\u002Fh3>\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 64px;\">\n        <sc-for list=\"{{ certs }}\" as=\"cert\" hint-placeholder-count=\"2\">\n          <a href=\"{{ cert.url }}\" target=\"_blank\" rel=\"noopener\" style=\"display: block; padding: 20px; border-radius: 10px; background: oklch(22% 0.01 95); border: 1px solid oklch(30% 0.01 95); text-decoration: none; color: inherit;\">\n            <div style=\"font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px; color: {{ accentColor }}; margin-bottom: 8px;\">{{ cert.provider }}<\u002Fdiv>\n            <div style=\"font-size: 15px; line-height: 1.4; margin-bottom: 12px;\">{{ cert.title }}<\u002Fdiv>\n            <div style=\"font-size: 13px; color: oklch(65% 0.01 95);\">Se achievement →<\u002Fdiv>\n          <\u002Fa>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <h3 style=\"font-size: 13px; text-transform: uppercase; letter-spacing: 0.1em; color: oklch(65% 0.01 95); font-weight: 700; margin: 0 0 20px;\">Kunskapsstack<\u002Fh3>\n      <div style=\"display: flex; flex-wrap: wrap; gap: 12px;\">\n        <sc-for list=\"{{ stack }}\" as=\"skill\" hint-placeholder-count=\"4\">\n          <div style=\"display: flex; align-items: center; gap: 8px; padding: 10px 16px; border-radius: 100px; background: oklch(22% 0.01 95); border: 1px solid oklch(30% 0.01 95); font-size: 14px;\">\n            <span>{{ skill.name }}<\u002Fspan>\n            <span style=\"font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 11px; color: #f97316;\">{{ skill.status }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- LÄR DIG -->\n  <section id=\"lar-dig\" style=\"padding: 90px 40px; max-width: 900px; margin: 0 auto;\">\n    <h2 style=\"font-size: 14px; text-transform: uppercase; letter-spacing: 0.1em; color: {{ accentColor }}; font-weight: 700; margin: 0 0 20px;\">Lär dig<\u002Fh2>\n    <p style=\"font-size: 17px; line-height: 1.7; color: oklch(35% 0.01 95); max-width: 640px; margin: 0 0 40px;\">Grunderna innan man går in i cybervärlden — skrivet både som mina egna anteckningar och för dig som är nyfiken.<\u002Fp>\n\n    <sc-for list=\"{{ faqGroups }}\" as=\"group\" hint-placeholder-count=\"3\">\n      <div style=\"margin-bottom: 40px;\">\n        <h3 style=\"font-size: 13px; text-transform: uppercase; letter-spacing: 0.1em; color: oklch(50% 0.01 95); font-weight: 700; margin: 0 0 16px;\">{{ group.title }}<\u002Fh3>\n        <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n          <sc-for list=\"{{ group.items }}\" as=\"item\" hint-placeholder-count=\"4\">\n            <div style=\"border: 1px solid oklch(88% 0.01 95); border-radius: 10px; background: oklch(99% 0.002 95); overflow: hidden;\">\n              <button onclick=\"{{ item.toggle }}\" style=\"width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 16px 20px; background: none; border: none; text-align: left; font-size: 15px; font-weight: 600; color: oklch(22% 0.01 95); cursor: pointer; font-family: inherit;\">\n                <span>{{ item.q }}<\u002Fspan>\n                <span style=\"font-family: ui-monospace, Menlo, Consolas, monospace; color: {{ accentColor }}; font-size: 18px; flex-shrink: 0;\">{{ item.icon }}<\u002Fspan>\n              <\u002Fbutton>\n              <sc-if value=\"{{ item.isOpen }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"padding: 0 20px 20px; font-size: 14.5px; line-height: 1.7; color: oklch(35% 0.01 95);\">{{ item.answerEl }}<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fsection>\n\n  <!-- GITHUB -->\n  <section id=\"github\" style=\"padding: 90px 40px; background: oklch(96% 0.006 95);\">\n    <div style=\"max-width: 900px; margin: 0 auto;\">\n      <h2 style=\"font-size: 14px; text-transform: uppercase; letter-spacing: 0.1em; color: {{ accentColor }}; font-weight: 700; margin: 0 0 20px;\">GitHub<\u002Fh2>\n      <p style=\"font-size: 17px; line-height: 1.7; color: oklch(35% 0.01 95); max-width: 640px; margin: 0 0 40px;\">Mina projekt läggs upp här allt eftersom jag bygger dem.<\u002Fp>\n\n      <div style=\"display: flex; flex-direction: column; gap: 16px; margin-bottom: 32px;\">\n        <sc-for list=\"{{ projects }}\" as=\"proj\" hint-placeholder-count=\"2\">\n          <div style=\"padding: 24px 28px; border-radius: 10px; background: oklch(99% 0.002 95); border: 1px solid oklch(89% 0.01 95);\">\n            <div style=\"font-size: 17px; font-weight: 600; margin-bottom: 8px;\">{{ proj.name }}<\u002Fdiv>\n            <div style=\"font-size: 15px; line-height: 1.6; color: oklch(35% 0.01 95); margin-bottom: 14px;\">{{ proj.desc }}<\u002Fdiv>\n            <a href=\"{{ proj.url }}\" target=\"_blank\" rel=\"noopener\" style=\"font-size: 14px; font-weight: 600; color: {{ accentColor }}; text-decoration: none;\">Se koden på GitHub →<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <div style=\"padding: 18px 28px; border-radius: 10px; border: 1px dashed oklch(80% 0.01 95); font-size: 14px; color: oklch(50% 0.01 95);\">Nästa projekt är på väg — håll utkik.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <a href=\"https://github.com/Leee270\" target=\"_blank\" rel=\"noopener\" style=\"display: inline-flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 600; color: oklch(22% 0.01 95); text-decoration: none;\">github.com/Leee270 →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- AKTIER -->\n  <section id=\"aktier\" style=\"padding: 90px 0 90px; overflow: hidden;\">\n    <div style=\"max-width: 900px; margin: 0 auto; padding: 0 40px;\">\n      <h2 style=\"font-size: 14px; text-transform: uppercase; letter-spacing: 0.1em; color: {{ accentColor }}; font-weight: 700; margin: 0 0 20px;\">Aktier<\u002Fh2>\n      <p style=\"font-size: 17px; line-height: 1.7; color: oklch(35% 0.01 95); max-width: 660px; margin: 0 0 12px;\">Bolag jag bevakar — kurser och nyheter sammanställda av mig (med hjälp av Claude), senast uppdaterat 3 juli 2026.<\u002Fp>\n      <div style=\"display: flex; gap: 12px; margin-bottom: 40px;\">\n        <button onclick=\"{{ setCardsView }}\" style=\"padding: 8px 16px; border-radius: 100px; border: 1px solid oklch(85% 0.01 95); background: {{ cardsBtnBg }}; color: {{ cardsBtnFg }}; font-size: 13px; font-weight: 600; cursor: pointer;\">Kort<\u002Fbutton>\n        <button onclick=\"{{ setCompactView }}\" style=\"padding: 8px 16px; border-radius: 100px; border: 1px solid oklch(85% 0.01 95); background: {{ compactBtnBg }}; color: {{ compactBtnFg }}; font-size: 13px; font-weight: 600; cursor: pointer;\">Kompakt<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Ticker -->\n    <div style=\"background: oklch(18% 0.01 95); padding: 16px 0; margin-bottom: 56px;\">\n      <div style=\"display: flex; width: max-content; animation: ticker-scroll 40s linear infinite;\">\n        <sc-for list=\"{{ tickerLoop }}\" as=\"t\" hint-placeholder-count=\"20\">\n          <div style=\"display: flex; align-items: center; gap: 8px; padding: 0 24px; font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 14px; white-space: nowrap; border-right: 1px solid oklch(30% 0.01 95); color: oklch(90% 0.01 95);\">\n            <span style=\"font-weight: 700;\">{{ t.ticker }}<\u002Fspan>\n            <span>{{ t.price }}<\u002Fspan>\n            <span style=\"color: {{ t.dirColor }};\">{{ t.change }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"max-width: 900px; margin: 0 auto; padding: 0 40px;\">\n      <h3 style=\"font-size: 13px; text-transform: uppercase; letter-spacing: 0.1em; color: oklch(50% 0.01 95); font-weight: 700; margin: 0 0 20px;\">Svenska bolag<\u002Fh3>\n      <div style=\"display: grid; grid-template-columns: {{ gridCols }}; gap: 16px; margin-bottom: 56px;\">\n        <sc-for list=\"{{ swedishStocks }}\" as=\"s\" hint-placeholder-count=\"4\">\n          <dc-import name=\"StockCard\" stock=\"{{ s }}\" compact=\"{{ isCompact }}\" accent-color=\"{{ accentColor }}\" hint-size=\"100%,140px\"><\u002Fdc-import>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <h3 style=\"font-size: 13px; text-transform: uppercase; letter-spacing: 0.1em; color: oklch(50% 0.01 95); font-weight: 700; margin: 0 0 20px;\">Globala bolag<\u002Fh3>\n      <div style=\"display: grid; grid-template-columns: {{ gridCols }}; gap: 16px; margin-bottom: 48px;\">\n        <sc-for list=\"{{ globalStocks }}\" as=\"s\" hint-placeholder-count=\"7\">\n          <dc-import name=\"StockCard\" stock=\"{{ s }}\" compact=\"{{ isCompact }}\" accent-color=\"{{ accentColor }}\" hint-size=\"100%,140px\"><\u002Fdc-import>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"display: flex; flex-wrap: wrap; gap: 20px; padding-top: 24px; border-top: 1px solid oklch(90% 0.01 95); margin-bottom: 16px;\">\n        <sc-for list=\"{{ sources }}\" as=\"src\" hint-placeholder-count=\"5\">\n          <a href=\"{{ src.url }}\" target=\"_blank\" rel=\"noopener\" style=\"font-size: 14px; color: oklch(40% 0.01 95); text-decoration: none; font-weight: 500;\">{{ src.name }} ↗<\u002Fa>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <p style=\"font-size: 13px; color: oklch(55% 0.01 95); line-height: 1.6;\">Kurser/nyheter sammanställt manuellt, inte live-uppdaterat. Riktkurser och rekommendationer (Köp/Behåll/Sälj) hämtade från Börskollen och Affärsvärlden.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- KONTAKT -->\n  <section id=\"kontakt\" style=\"padding: 100px 40px; max-width: 900px; margin: 0 auto;\">\n    <h2 style=\"font-size: 14px; text-transform: uppercase; letter-spacing: 0.1em; color: {{ accentColor }}; font-weight: 700; margin: 0 0 20px;\">Kontakt<\u002Fh2>\n    <h3 style=\"font-size: 36px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 16px;\">Hör av dig<\u002Fh3>\n    <p style=\"font-size: 17px; line-height: 1.7; color: oklch(35% 0.01 95); max-width: 560px; margin: 0 0 36px;\">Öppen för frågor, samarbeten eller bara att snacka cybersäkerhet.<\u002Fp>\n    <div style=\"display: flex; flex-wrap: wrap; gap: 14px;\">\n      <a href=\"mailto:filip@family-le.com\" style=\"padding: 14px 22px; border-radius: 8px; background: oklch(22% 0.01 95); color: oklch(98% 0.005 95); text-decoration: none; font-size: 15px; font-weight: 600;\">filip@family-le.com<\u002Fa>\n      <a href=\"https://www.linkedin.com/in/filip-le-964878273/\" target=\"_blank\" rel=\"noopener\" style=\"padding: 14px 22px; border-radius: 8px; border: 1px solid oklch(85% 0.01 95); color: oklch(22% 0.01 95); text-decoration: none; font-size: 15px; font-weight: 600;\">LinkedIn<\u002Fa>\n      <a href=\"https://github.com/Leee270\" target=\"_blank\" rel=\"noopener\" style=\"padding: 14px 22px; border-radius: 8px; border: 1px solid oklch(85% 0.01 95); color: oklch(22% 0.01 95); text-decoration: none; font-size: 15px; font-weight: 600;\">GitHub<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer style=\"padding: 32px 40px; text-align: center; font-size: 13px; color: oklch(55% 0.01 95); border-top: 1px solid oklch(90% 0.01 95);\">filiple.com — byggd av mig, steg för steg.<\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#d97706&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#16a34a&quot;,&quot;#2563eb&quot;,&quot;#d97706&quot;]}}\">\nclass Component extends DCLogic {\n  state = { stockView: 'cards', openFaq: null, activeSection: 'om-mig' };\n\n  componentDidMount() {\n    this._ids = ['om-mig', 'cybersakerhet', 'lar-dig', 'github', 'aktier', 'kontakt'];\n    this._stopped = false;\n    const OFFSET = 96; // px below sticky nav used as the \"current section\" line\n\n    const computeActive = () => {\n      let current = this._ids[0];\n      for (const id of this._ids) {\n        const el = document.getElementById(id);\n        if (!el) continue;\n        const top = el.getBoundingClientRect().top;\n        if (top <= OFFSET) current = id;\n      }\n      if (current !== this.state.activeSection) this.setState({ activeSection: current });\n    };\n\n    this._onScroll = () => computeActive();\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    window.addEventListener('resize', this._onScroll);\n    computeActive();\n  }\n\n  componentWillUnmount() {\n    this._stopped = true;\n    window.removeEventListener('scroll', this._onScroll);\n    window.removeEventListener('resize', this._onScroll);\n  }\n\n  renderVals() {\n    const accentColor = this.props.accentColor || '#16a34a';\n    const isCompact = this.state.stockView === 'compact';\n    const openFaq = this.state.openFaq;\n\n    const rawFaqGroups = [\n      { title: 'Grunderna', items: [\n        { q: 'Vad är ett LAN (lokalt nätverk)?', a: '<p>LAN (Local Area Network) är ett nätverk begränsat till en plats, t.ex. ditt hem, ett kontor eller en skola. Alla enheter i ett LAN kan prata med varandra direkt, utan att gå via internet — din mobil och din pappas dator hemma är exempel på enheter i samma LAN.<\u002Fp>' },\n        { q: 'Vad är en router?', a: '<p>En router är enheten som kopplar samman ditt lokala nätverk (LAN) med internet. Den avgör vilken väg data ska ta för att komma fram, och är oftast den enhet som delar ut IP-adresser till dina prylar hemma.<\u002Fp>' },\n        { q: 'Vad är en switch?', a: '<p>En switch kopplar samman enheter <em>inom<\u002Fem> samma LAN, t.ex. datorer på ett kontor. Den ser till att data hittar rätt till exakt rätt enhet inom det lokala nätverket, till skillnad från routern som pratar med världen utanför.<\u002Fp>' },\n        { q: 'Hur kommunicerar olika enheter med varandra över ett nätverk?', a: `\n          <p>Tänk att ditt WiFi hemma är som ett stort hus. Alla enheter som är uppkopplade på samma WiFi \"bor\" i samma hus, men varje enhet har sitt eget lägenhetsnummer. Det lägenhetsnumret är en IP-adress.<\u002Fp>\n          <p>Till exempel kan:<\u002Fp>\n          <ul><li>Din mobil ha 192.168.1.1<\u002Fli><li>Din pappas dator ha 192.168.1.2<\u002Fli><li>Din iPad ha 192.168.1.3<\u002Fli><\u002Ful>\n          <p>De tre första delarna (192.168.1) visar att alla tillhör samma nätverk – alltså samma \"hus\". Det sista numret (1, 2, 3...) identifierar vilken enhet det är, ungefär som ett lägenhetsnummer.<\u002Fp>\n          <p><strong>Vad händer när du öppnar en webbsida?<\u002Fstrong> Säg att du öppnar Google på din mobil:<\u002Fp>\n          <ol><li>Din mobil skickar först en förfrågan till routern.<\u002Fli><li>Routern skickar sedan förfrågan vidare ut på internet.<\u002Fli><li>Google skickar tillbaka svaret.<\u002Fli><li>Routern ser att förfrågan kom från 192.168.1.1 och skickar därför svaret tillbaka till just din mobil – inte till din pappas dator eller din iPad.<\u002Fli><\u002Fol>\n          <p>Det är IP-adressen som gör att rätt information hamnar hos rätt enhet.<\u002Fp>\n          <p><strong>Hur fungerar det i större nätverk?<\u002Fstrong> Hemma kanske ni bara har 4–5 enheter uppkopplade. Men tänk dig ett universitetsbibliotek med över 1 000 enheter uppkopplade samtidigt — det fungerar fortfarande på samma sätt. Varje enhet har sin egen unika IP-adress, så när svaret kommer tillbaka vet nätverket exakt vem som ska ha det, oavsett hur många andra som också surfar samtidigt.<\u002Fp>` },\n        { q: 'Vad är ett WAN (Wide Area Network)?', a: '<p>Ett WAN är ett nätverk som sträcker sig över en större geografisk yta och kopplar samman flera LAN — t.ex. alla byggnader på ett skolområde, eller alla kontor i ett företag i olika städer. Om ett LAN är nätverket i ett hus, är ett WAN nätverket som binder ihop flera hus.<\u002Fp>' },\n        { q: 'Vad är internet / WWW?', a: '<p>Internet är det globala nätverket av miljontals sammankopplade LAN och WAN över hela världen — nätverkens nätverk. WWW (World Wide Web) är egentligen bara en av tjänsterna som körs ovanpå internet: samlingen av webbsidor du besöker i en webbläsare. Webben är alltså en del av internet, inte hela internet — mejl och filöverföring är exempel på annat som också går via internet.<\u002Fp>' },\n      ]},\n      { title: 'Protokoll & webb', items: [\n        { q: 'Hur fungerar HTTP och HTTPS?', a: '<p>HTTP (HyperText Transfer Protocol) är språket en webbläsare (<strong>klienten<\u002Fstrong>) och en webbserver (<strong>servern<\u002Fstrong>) använder för att prata med varandra. Klienten skickar en <strong>request<\u002Fstrong> (\"kan jag få den här sidan?\") och servern svarar med en <strong>response<\u002Fstrong> (sidans innehåll, eller ett felmeddelande om något gick fel). HTTPS är samma sak, fast krypterat — S:et står för Secure — så att ingen som avlyssnar trafiken kan läsa vad som skickas.<\u002Fp>' },\n        { q: 'Vad är en IP-adress?', a: '<p>En IP-adress är en unik \"adress\" som varje enhet på internet får, ungefär som ett personnummer. Den gör att data vet exakt vart den ska skickas och varifrån den kommer. Det finns två versioner i bruk idag — IPv4 (t.ex. 192.168.1.1) och det nyare IPv6.<\u002Fp>' },\n        { q: 'Vad är ett domännamn och DNS?', a: '<p>När du skriver \"youtube.com\" i webbläsaren är det egentligen inte det sidan \"heter\" i teknisk mening — bakom kulisserna pekar det namnet mot en specifik IP-adress, ungefär som ett personnummer pekar ut en specifik person. IP-adresser är opraktiska för människor att komma ihåg — därför använder vi domännamn istället, som fungerar som en telefonkatalog: du slår upp ett namn du minns, och katalogen (DNS) hittar rätt \"nummer\" åt dig.<\u002Fp>' },\n        { q: 'Vad är DNS?', a: '<p>DNS (Domain Name System) är själva systemet/katalogen som gör kopplingen mellan domännamn och IP-adresser i praktiken. När du skriver in en adress skickas en fråga till en DNS-server, som slår upp vilken IP-adress namnet hör till och skickar tillbaka svaret — på någon bråkdel av en sekund. Utan DNS skulle du behöva skriva in siffror istället för namn varje gång.<\u002Fp>' },\n      ]},\n      { title: 'Nätverksteknik', items: [\n        { q: 'Vad är IPv4?', a: '<p>IPv4 är den äldre och fortfarande mest använda versionen av IP-adresser. Den skrivs som fyra tal mellan 0–255 (t.ex. 192.168.1.1) och ger cirka 4,3 miljarder unika adresser — därför håller det nyare IPv6 gradvis på att ta över.<\u002Fp>' },\n        { q: 'Vad är en subnetmask?', a: '<p>En subnetmask talar om vilken del av en IP-adress som representerar nätverket och vilken del som representerar den enskilda enheten. Ett vanligt exempel är 255.255.255.0, som säger att de tre första talen pekar ut nätverket och det sista pekar ut enheten.<\u002Fp>' },\n        { q: 'Vad är en gateway?', a: '<p>En gateway (ofta samma sak som routern hemma) är \"utgången\" en enhet skickar all trafik till som ska lämna det egna nätverket. Utan en gateway inställd kan enheten bara prata med andra enheter i samma nätverk, inte med internet.<\u002Fp>' },\n        { q: 'Vad är DHCP?', a: '<p>DHCP delar automatiskt ut IP-adresser till enheter när de ansluter till ett nätverk. Det är därför din telefon bara \"kopplar upp sig\" utan att du manuellt behöver skriva in en adress.<\u002Fp>' },\n        { q: 'Vad är TCP?', a: '<p>TCP skickar data där mottagaren bekräftar att varje del kommit fram korrekt och i rätt ordning. Pålitligt men något långsammare — används när inget data får gå förlorat, t.ex. vid webbsidor och mejl.<\u002Fp>' },\n        { q: 'Vad är UDP?', a: '<p>UDP skickar data utan att vänta på bekräftelse, vilket gör det snabbare men mindre pålitligt. Används där hastighet är viktigare än perfektion, t.ex. videosamtal eller onlinespel.<\u002Fp>' },\n        { q: 'Vad är routing?', a: '<p>Routing är processen där routrar avgör vilken väg data ska ta för att nå sitt mål, ofta genom flera nätverk på vägen — ungefär som postsortering steg för steg mot rätt destination.<\u002Fp>' },\n        { q: 'Vad är VLAN?', a: '<p>VLAN gör det möjligt att dela upp ett fysiskt nätverk i flera separata nätverk, även om enheterna sitter på samma switch. Används t.ex. för att hålla isär gäst-WiFi och kontorsnätverk på samma hårdvara.<\u002Fp>' },\n      ]},\n    ];\n\n    const faqGroups = rawFaqGroups.map((group, gi) => ({\n      title: group.title,\n      items: group.items.map((item, ii) => {\n        const id = `${gi}-${ii}`;\n        const isOpen = openFaq === id;\n        return {\n          q: item.q,\n          isOpen,\n          icon: isOpen ? '−' : '+',\n          toggle: () => this.setState(s => ({ openFaq: s.openFaq === id ? null : id })),\n          answerEl: React.createElement('div', { dangerouslySetInnerHTML: { __html: item.a } }),\n        };\n      }),\n    }));\n\n    const resan = [\n      { when: 'Nu', whenColor: accentColor, text: 'Förbereder mig på egen hand — grunder i nätverk, Linux och cybersäkerhet' },\n      { when: 'Höstterminen 2026', whenColor: '#f97316', text: 'Börjar studera nätverk, digital infrastruktur & cybersäkerhet' },\n      { when: 'Under studierna', whenColor: accentColor, text: 'Certifieringar, hemmalabb och praktiska projekt, dokumenterade här och på GitHub' },\n      { when: 'Mål', whenColor: accentColor, text: 'Bygga en karriär inom cybersäkerhet och digital infrastruktur efter examen' },\n    ];\n\n    const certs = [\n      { provider: 'Microsoft Learn', title: 'Beskriv grundläggande cybersäkerhetshot, attacker och riskreducering', url: 'https://learn.microsoft.com/api/achievements/share/sv-se/Leee270/VS56RWSM?sharingId=5BA1246BC22E5972' },\n      { provider: 'Microsoft Learn', title: 'Beskriva nätverksbaserade hot och åtgärder', url: 'https://learn.microsoft.com/api/achievements/share/sv-se/Leee270/BU3N9EED?sharingId=5BA1246BC22E5972' },\n    ];\n\n    const stack = [\n      { name: 'Nätverk, infrastruktur & cybersäkerhet (JU)', status: 'HT 2026' },\n      { name: 'Linux', status: 'pågår' },\n      { name: 'Python', status: 'pågår' },\n    ];\n\n    const projects = [\n      { name: 'filiple.com — portfolio & CV-sida', desc: 'Byggde min egen portfolio/CV-sida från grunden, med ett ljust professionellt läge och ett mörkt \"hacker\"-läge. Innehåller bland annat en accordion-FAQ om nätverksgrunder.', url: 'https://github.com/Leee270/filiple-website' },\n      { name: 'Aktie-terminal', desc: 'En börsterminal-inspirerad dashboard med öppningspriser, riktkurser, rekommendationer och nyheter för svenska och globala bolag — inbyggd direkt på sajten, se fliken \"Aktier\".', url: 'https://github.com/Leee270/filiple-website' },\n    ];\n\n    const sources = [\n      { name: 'Google News', url: 'https://news.google.com/search?hl=sv-SE&gl=SE' },\n      { name: 'Avanza', url: 'https://www.avanza.se' },\n      { name: 'Nordnet', url: 'https://www.nordnet.se' },\n      { name: 'Dagens Industri', url: 'https://www.di.se' },\n      { name: 'Placera', url: 'https://www.placera.se' },\n    ];\n\n    const dirColor = (dir) => dir === 'up' ? '#4ade80' : dir === 'down' ? '#f87171' : '#a3a3a3';\n\n    const swedishStocks = [\n      { ticker: 'ERIC-B', name: 'Ericsson', price: '112,0 SEK', change: '-1,8%', dir: 'down', note: 'Per Narvinger tar över som vd 1 okt 2026 efter Börje Ekholm. Bolaget har även inlett rättsliga åtgärder mot Transsion för påstått patentintrång kring 4G/5G.', target: '~103 kr (Börskollen)', rec: 'Blandad — Handelsbanken/Nordea Köp, Goldman Sachs Sälj' },\n      { ticker: 'INVE-B', name: 'Investor', price: '~380 SEK', change: 'stigande', dir: 'up', note: 'Investmentbolaget bakom bl.a. ABB, AstraZeneca, Ericsson och Saab. Stigande trendkanal, stöd kring 373 kr. Q3-rapport: 71,3 md SEK omsättning, 55,4 md SEK vinst.', target: '~382 kr (Börskollen)', rec: 'Blandad — SEB Behåll, DNB Carnegie Köp' },\n      { ticker: 'VOLV-B', name: 'Volvo', price: '338,6 SEK', change: '+1,9%', dir: 'up', note: 'Siktar på nästan 3 md USD i intäkter från autonom transport, efter tidigare nedgång på sin Capital Markets Day.', target: '~353 kr (Börskollen)', rec: 'Köp (konsensus övervikt, 64% positiva)' },\n      { ticker: 'SAAB-B', name: 'Saab', price: '519,5 SEK', change: '+3,3%', dir: 'up', note: 'Starkt Q1 2026 med 23,6% organisk tillväxt. NATO planerar ersätta en flotta med Saab-produkter; Polen valde Kockums för nästa generations ubåtar.', target: '~610 kr (Börskollen)', rec: 'Köp (SEB, Danske Bank, Pareto Securities)' },\n    ].map(s => ({ ...s, dirColor: dirColor(s.dir) }));\n\n    const globalStocks = [\n      { ticker: 'TSLA', name: 'Tesla', price: '$393,5', change: '-7,5%', dir: 'down', note: 'Föll trots starkt Q2 med rekordleveranser (480 126 fordon) — ett klassiskt \"sälj på nyheten\"-mönster.', target: '~464 USD (Börskollen)', rec: 'Blandad — Wedbush Köp, Morgan Stanley Behåll' },\n      { ticker: 'NVDA', name: 'Nvidia', price: '$194,8', change: '-1,4%', dir: 'down', note: 'Nya intäktsdelningsavtal med AI-molnleverantörer och allians med Palantir. Marknadsvärde ca 4,7 biljoner dollar.', target: '~138 USD (äldre snitt)', rec: 'Behåll/Neutral (Affärsvärlden)' },\n      { ticker: 'AMD', name: 'AMD', price: '$517,8', change: '-4,3%', dir: 'down', note: 'Ned med resten av halvledarsektorn. Marknadsvärde ca 844 md dollar.', target: '~284 USD (Börskollen)', rec: 'Köp (DBS Bank)' },\n      { ticker: 'PLTR', name: 'Palantir', price: '$129,8', change: '+3,2%', dir: 'up', note: 'Uppgradering från DA Davidson och nyheten om AI-samarbete med Nvidia. Marknadsvärde ca 310 md dollar.', target: '~165 USD (Börskollen)', rec: 'Ingen tydlig konsensus' },\n      { ticker: 'CRWD', name: 'CrowdStrike', price: '$194,0', change: '+0,4%', dir: 'up', note: 'Kursnivån speglar en 4-för-1 aktiesplit, inte ett kursfall. Expanderar AI-säkerhetssamarbete med AWS; ledare i Forrester Wave för XDR.', target: '~294 USD (ojusterad)', rec: 'Köp (Wolfe Research)' },\n      { ticker: 'ASTS', name: 'AST SpaceMobile', price: '$86,5', change: '-0,5%', dir: 'down', note: '926 M USD i japanskt statligt stöd för samriskbolag med Rakuten. FCC öppnade 800 MHz-spektrum för satellit-till-telefon.', target: 'Ingen aktuell data', rec: 'Ingen aktuell data' },\n      { ticker: 'SPCX', name: 'SpaceX', price: '$158,7', change: 'stabil', dir: 'flat', note: 'Börsnoterades 12 juni 2026 till 135 USD/aktie — världens största börsnotering någonsin. Volatil resa (topp 226, botten 147).', target: '175 USD (Wolfe Research)', rec: 'Köp (Wolfe Research)' },\n    ].map(s => ({ ...s, dirColor: dirColor(s.dir) }));\n\n    const tickerLoop = [...swedishStocks, ...globalStocks, ...swedishStocks, ...globalStocks];\n\n    return {\n      accentColor,\n      isCompact,\n      gridCols: isCompact ? 'repeat(auto-fit, minmax(220px, 1fr))' : 'repeat(auto-fit, minmax(260px, 1fr))',\n      resan, certs, stack, projects, sources, faqGroups,\n      navLinks: [\n        { href: '#om-mig', label: 'Om mig', id: 'om-mig' },\n        { href: '#cybersakerhet', label: 'Cybersäkerhet', id: 'cybersakerhet' },\n        { href: '#l
